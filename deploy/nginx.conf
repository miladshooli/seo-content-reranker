# /etc/nginx/sites-available/seo-reranker
# After enabling, add HTTPS:
#   certbot --nginx -d your.domain.com --redirect
server {
    listen 80;
    server_name _;            # replace with your domain (or <sub>.<ip>.nip.io)

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 130s;     # background jobs poll; keep generous
    }
}
